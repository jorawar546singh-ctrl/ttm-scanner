name: TTM Scanner

on:
  schedule:
    - cron: "*/15 13-20 * * 1-5"
  workflow_dispatch:

concurrency:
  group: scanner
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run breakout scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          FMP_API_KEY:        ${{ secrets.FMP_API_KEY }}
          TZ: America/New_York
        run: python ttm_scanner.py

      - name: Run streak tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TZ: America/New_York
        run: python streak_tracker.py

      - name: Run position tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TZ: America/New_York
        run: python position_tracker.py

      - name: Commit results back to repo
        run: |
          git config user.name  "ttm-scanner-bot"
          git config user.email "actions@github.com"
          git add latest.json history.json alerted.log alerted_history.json streaks_state.json positions_state.json breakouts_*.csv 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "scan $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "No data changes to commit."
          fi
